# Whitelist токенов для HL Weekly Planner
# Каноническое определение whitelist.html в LP_Wallet_Tracker, но в YAML для машинной обработки.
# tier: 1=якорь (BTC/ETH), 2=крупный альт, 3=narrative bet
# hl_symbol: имя на Hyperliquid; null если перп не листится (бот пропустит)
# coingecko_id: для запасного источника цен/MA, если HL не отдаёт historical OHLC
# thesis: твоё обоснование, почему этот токен в whitelist (выводится в отчёт)

last_updated: 2026-05
version: 1

# 3 кошелька для daily-monitor. Адреса публичные (read-only HL Info API).
# Бот агрегирует позиции по coin между ними как один логический портфель.
accounts:
  - address: "0x17e6D71D30d260e30BB7721C63539694aB02b036"
    label: main
  - address: "0x10082016a94920aBdf410CDB6f98c2Ead2c57340"
    label: second
  - address: "0x305220d077474c5cab839E7C1cB3264Aca19f1B9"
    label: third

rules:
  hl_perp_max_leverage_strong: 2
  hl_perp_max_leverage_moderate: 1
  funding_apr_skip_above: 60         # %, годовых
  rsi_d1_overheated: 80
  sl_hard_floor_pct: 25              # max -25% от entry (недельное окно требует запаса)
  atr_multiplier: 2.5                # шире чем дефолт 2.0 — пережить недельную волатильность
  swing_low_lookback: 30             # окно swing low в днях (≈ месяц)
  ema_short: 50
  ema_long: 200

tokens:
  BTC:
    tier: 1
    hl_symbol: BTC
    coingecko_id: bitcoin
    thesis: "Reserve asset, regime anchor"
  ETH:
    tier: 1
    hl_symbol: ETH
    coingecko_id: ethereum
    thesis: "Programmable money, ETH/BTC regime hedge"
