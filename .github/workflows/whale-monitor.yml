name: whale-monitor

on:
  schedule:
    # Каждые 4 часа: 00:00 / 04:00 / 08:00 / 12:00 / 16:00 / 20:00 UTC
    # (03/07/11/15/19/23 MSK). GH Actions может добавить 5-15 минут.
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # need to commit state/whale_*.{jsonl,json} back to repo

concurrency:
  group: hl-whale-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      # GitHub's default token; bumps unauth rate limit on /commits API
      # (used by daily_monitor's oracai_history, harmless here)
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Telegram secrets — whale_monitor (Phase 2.6) sends instant alerts
      # and the 24h digest through telegram_sender. Without these the
      # process crashes at import time of src.daily_monitor (transitive).
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run whale monitor
        run: python -m src.whale_monitor

      - name: Commit state changes
        run: |
          set +e  # don't kill the step on any single command's failure
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add each state file individually — a missing file (e.g. no
          # rotated archive yet, no pending_info on quiet runs) must not
          # abort the entire add chain. We use shopt nullglob so unmatched
          # globs expand to empty, then loop.
          shopt -s nullglob
          STATE_FILES=(
            state/whale_fills.jsonl
            state/whale_fills_*.jsonl.gz
            state/whale_cursor.json
            state/whale_signals.jsonl
            state/whale_seen.json
            state/whale_run_meta.json
            state/whale_pending_info.jsonl
            state/whale_last_digest.json
            state/leaderboard_ranks.json
            state/leaderboard_history.jsonl
            state/leaderboard_history_*.jsonl.gz
          )
          for f in "${STATE_FILES[@]}"; do
            if [ -f "$f" ]; then
              git add "$f" || true
            fi
          done

          if git diff --cached --quiet; then
            echo "no whale-state changes to commit"
            exit 0
          fi

          # Compact one-line message with run timestamp
          TS=$(date -u +"%Y-%m-%dT%H:%MZ")
          git commit -m "chore(whale-monitor): state update ${TS} [skip ci]"

          # Retry push up to 3 times to absorb conflicts with concurrent runs
          for i in 1 2 3; do
            if git push; then
              break
            fi
            echo "push attempt $i failed, rebasing and retrying"
            git pull --rebase --autostash
            sleep $((i * 2))
          done
