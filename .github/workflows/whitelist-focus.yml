name: whitelist-focus

on:
  schedule:
    # Каждый день 06:05 UTC = 09:05 MSK
    # Сразу после eth-focus (06:00 UTC), до первого daily-monitor (07:00 UTC)
    - cron: "5 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hl-whitelist-focus
  cancel-in-progress: false

jobs:
  whitelist-focus:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run whitelist focus
        run: python -m src.whitelist_focus_runner
