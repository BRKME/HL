name: daily-monitor

on:
  schedule:
    # Каждый день 06:00 UTC = 09:00 MSK
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      debug_sl:
        description: "Dump raw frontendOpenOrders to state/_sl_debug.json"
        type: boolean
        default: false

permissions:
  contents: write  # needed if DEBUG_SL writes state/_sl_debug.json

concurrency:
  group: hl-daily-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
      # Optional: lifts GitHub unauth rate limit on /commits API (oracai_history)
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run daily monitor
        env:
          DEBUG_SL: ${{ inputs.debug_sl && '1' || '' }}
        run: python -m src.daily_monitor

      - name: Commit debug dump if produced
        if: ${{ inputs.debug_sl }}
        run: |
          if [ -f state/_sl_debug.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/_sl_debug.json
            git commit -m "debug(daily-monitor): SL dump [skip ci]" || true
            git push || true
          fi
