name: signal-backtester

on:
  schedule:
    # Каждую пятницу 18:00 UTC = 21:00 MSK — конец рабочей недели,
    # достаточно данных за неделю накоплено
    - cron: "0 18 * * 5"
  workflow_dispatch: {}

permissions:
  contents: write          # для коммита state/whale_signal_stats.json обратно

concurrency:
  group: hl-signal-backtester
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run signal backtester
        run: python -m src.signal_backtester_runner

      - name: Commit stats back
        run: |
          git config user.name "Aleksander Brk"
          git config user.email "106615154+BRKME@users.noreply.github.com"
          if [ -n "$(git status --porcelain state/whale_signal_stats.json)" ]; then
            git add state/whale_signal_stats.json
            git commit -m "backtester: update whale_signal_stats [skip ci]"
            git push
          else
            echo "no stats change to commit"
          fi
