name: signal-backtester

on:
  schedule:
    # Каждую пятницу 18:00 UTC = 21:00 MSK — конец рабочей недели,
    # достаточно данных за неделю накоплено
    - cron: "0 18 * * 5"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hl-signal-backtester
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run signal backtester
        run: python -m src.signal_backtester_runner
