name: eth-focus

on:
  schedule:
    # Каждую субботу 07:30 UTC = 10:30 MSK
    # (30 минут после weekly scan-bot, чтобы не пересекаться по доставке)
    - cron: "30 7 * * 6"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hl-eth-focus
  cancel-in-progress: false

jobs:
  focus:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run ETH Focus
        run: python -m src.eth_focus_runner
