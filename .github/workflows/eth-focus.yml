name: eth-focus

on:
  schedule:
    # Каждый день 06:00 UTC = 09:00 MSK
    # За час до первого daily-monitor (10:00 MSK), чтобы утром
    # был вердикт по ETH прежде чем смотреть портфель
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # commit state/verdict_journal.jsonl back to repo

concurrency:
  group: hl-eth-focus
  cancel-in-progress: false

jobs:
  focus:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run ETH Focus
        run: python -m src.eth_focus_runner

      - name: Commit verdict journal
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f "state/verdict_journal.jsonl" ]; then
            git add state/verdict_journal.jsonl || true
          fi
          if git diff --cached --quiet; then
            echo "no verdict journal changes to commit"
            exit 0
          fi
          TS=$(date -u +"%Y-%m-%dT%H:%MZ")
          git commit -m "chore(eth-focus): journal update ${TS} [skip ci]"
          for i in 1 2 3; do
            if git push; then break; fi
            git pull --rebase --autostash
            sleep $((i * 2))
          done
