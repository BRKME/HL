name: position-guard
on:
  schedule:
    - cron: "15 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements.txt
      - name: Run position guard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.position_guard
      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state/tactical_state.json state/tactical_journal.jsonl state/guard_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "guard: position/regime watch [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."; sleep 5
          done
