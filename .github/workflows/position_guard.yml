name: position-guard
on:
  schedule:
    - cron: "15 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements.txt
      - name: Run position guard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.position_guard
      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          echo "=== porcelain before add ==="
          git status --porcelain state/ || true
          git add state/tactical_state.json state/tactical_journal.jsonl state/guard_state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "nothing staged — guard made no changes this run"
            exit 0
          fi
          git commit -m "guard: position/regime watch [skip ci]"
          # Паттерн из whale-monitor (единственный доказанно рабочий здесь):
          # push СНАЧАЛА, rebase только при отказе, и обязательно --autostash —
          # гвард транзитивно (portfolio/oracai кэши) пачкает state/, и голый
          # `pull --rebase origin main` детерминированно падал на unstaged
          # changes все 3 попытки. Причина 4 суток фантомных повторов.
          pushed=0
          for i in 1 2 3; do
            if OUT=$(git push 2>&1); then
              pushed=1; echo "$OUT"; break
            fi
            echo "push attempt $i failed: $OUT"
            git pull --rebase --autostash 2>&1 || true
            sleep $((i * 2))
          done
          if [ "$pushed" != "1" ]; then
            echo "::error::guard push failed 3x. last git output: ${OUT}"
            exit 1
          fi
          echo "pushed $(git rev-parse --short HEAD)"
