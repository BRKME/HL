name: weekly-kpi

# Воскресная KPI-сводка успешности по слоям: тактика (R-мультипли из журнала
# сигналов), субботний советник vs always-DCA, портфель (серверный P&L HL).
on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:

jobs:
  kpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Weekly KPI
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.weekly_kpi
