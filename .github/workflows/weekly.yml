name: weekly-plan

on:
  # Субботний пост в канал ОТКЛЮЧЁН (оператор 13.06: сигнал нужен в моменте, а
  # не по расписанию — для этого тактический слой tactical-signals.yml).
  # Планировщик всё ещё бежит еженедельно, но ТИХО (WEEKLY_SILENT=1): пишет
  # decisions.jsonl для advisor-alpha KPI, ничего не шлёт в Telegram.
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hl-weekly-plan
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
      WEEKLY_SILENT: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run weekly planner (silent — logs decisions, no channel post)
        run: python -m src.main

      - name: Commit decisions log
        if: always()
        run: |
          git config user.name "hl-planner-bot"
          git config user.email "bot@users.noreply.github.com"
          git add decisions.jsonl 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "decision: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
