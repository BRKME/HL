name: weekly-plan

on:
  schedule:
    # Суббота 07:00 UTC = 10:00 MSK
    - cron: "0 7 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hl-weekly-plan
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run weekly planner
        run: python -m src.main

      - name: Commit decisions log
        if: always()
        run: |
          git config user.name "hl-planner-bot"
          git config user.email "bot@users.noreply.github.com"
          git add decisions.jsonl 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "decision: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
